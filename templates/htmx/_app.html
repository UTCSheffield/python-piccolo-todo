<section id="app">
  <p>
    Logged in as <strong>{{ user.username }}</strong>
    <button hx-post="/htmx/logout" hx-confirm="Log out?" style="margin-left:1rem">Log out</button>
  </p>

  <!-- ---- Todo ---- -->
  <h2>Todos</h2>

  <form hx-post="/htmx/todos" hx-target="#todo-table" hx-swap="outerHTML"
        hx-on::after-request="this.reset()" style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem">
    <input name="task" type="text" placeholder="Task" required />
    <select name="category" required>
      {% for item in categories %}
        <option value="{{ item.id }}">{{ item.name }}</option>
      {% endfor %}
    </select>
    <label><input name="done" type="checkbox" /> Done</label>
    <button type="submit">Add Todo</button>
  </form>

  <div id="todo-table" hx-get="/htmx/todos"
       hx-trigger="load" hx-swap="outerHTML">
    <p>Loading todos…</p>
  </div>

</section>
